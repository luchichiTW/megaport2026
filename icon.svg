<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Liquid glass gradient -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.14)"/>
    </linearGradient>
    <!-- Specular highlight -->
    <linearGradient id="spec" x1="0.5" y1="0" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Ambient glow -->
    <radialGradient id="glow1" cx="0.3" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.7" cy="0.7" r="0.5">
      <stop offset="0%" stop-color="#F4A261" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F4A261" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#6C7BD8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6C7BD8" stop-opacity="0"/>
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="txtGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#050508"/>

  <!-- Ambient light orbs -->
  <rect width="512" height="512" rx="112" fill="url(#glow1)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow2)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow3)"/>

  <!-- Glass panel -->
  <rect x="56" y="56" width="400" height="400" rx="72" fill="url(#glass)"/>
  <rect x="56" y="56" width="400" height="400" rx="72" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- Top specular highlight -->
  <rect x="56" y="56" width="400" height="200" rx="72" fill="url(#spec)" opacity="0.6"/>

  <!-- Soundwave bars — Megaport vibe -->
  <g opacity="0.9">
    <rect x="130" y="220" width="22" height="72" rx="11" fill="url(#txtGrad)"/>
    <rect x="166" y="188" width="22" height="136" rx="11" fill="url(#txtGrad)"/>
    <rect x="202" y="156" width="22" height="200" rx="11" fill="url(#txtGrad)"/>
    <rect x="238" y="170" width="22" height="172" rx="11" fill="url(#txtGrad)"/>
    <rect x="274" y="148" width="22" height="216" rx="11" fill="url(#txtGrad)"/>
    <rect x="310" y="180" width="22" height="152" rx="11" fill="url(#txtGrad)"/>
    <rect x="346" y="204" width="22" height="104" rx="11" fill="url(#txtGrad)"/>
    <rect x="382" y="232" width="22" height="48" rx="11" fill="url(#txtGrad)"/>
  </g>

  <!-- "大港" text -->
  <text x="256" y="440" text-anchor="middle"
    font-family="-apple-system, 'SF Pro Display', 'Noto Sans TC', sans-serif"
    font-size="52" font-weight="900" letter-spacing="8"
    fill="url(#txtGrad)">大港</text>
</svg>
