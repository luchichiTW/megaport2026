  <style>

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --spring: cubic-bezier(.175,.885,.32,1.275);
      --ease-out: cubic-bezier(.16,1,.3,1);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html { background:#000; }

    body {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Noto Sans TC', system-ui, sans-serif;
      color: rgba(255,255,255,.92);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    /* ═══ Ambient light canvas ═══ */
    .ambient-wrap {
      position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
      background: #050508;
    }
    .orb {
      position:absolute; border-radius:50%; filter:blur(80px);
      mix-blend-mode:screen; will-change:transform;
    }
    .orb-1 {
      width:420px; height:420px; top:-120px; left:-60px;
      background:radial-gradient(circle, rgba(230,57,70,.35), transparent 70%);
      animation: float1 16s ease-in-out infinite alternate;
    }
    .orb-2 {
      width:350px; height:350px; bottom:-80px; right:-40px;
      background:radial-gradient(circle, rgba(244,162,97,.28), transparent 70%);
      animation: float2 20s ease-in-out infinite alternate;
    }
    .orb-3 {
      width:300px; height:300px; top:40%; left:50%;
      background:radial-gradient(circle, rgba(108,123,216,.2), transparent 70%);
      animation: float3 18s ease-in-out infinite alternate;
    }
    @keyframes float1 { to { transform:translate(100px,80px) scale(1.15); } }
    @keyframes float2 { to { transform:translate(-80px,-100px) scale(1.2); } }
    @keyframes float3 { to { transform:translate(-60px,50px) scale(1.1); } }

    /* ═══ Liquid Glass material ═══ */
    .liquid-glass {
      background: linear-gradient(
        135deg,
        rgba(255,255,255,.10) 0%,
        rgba(255,255,255,.05) 50%,
        rgba(255,255,255,.08) 100%
      );
      backdrop-filter: blur(50px) saturate(200%) brightness(1.1);
      -webkit-backdrop-filter: blur(50px) saturate(200%) brightness(1.1);
      box-shadow:
        0 8px 32px rgba(0,0,0,.25),
        inset 0 .5px 0 rgba(255,255,255,.25),
        inset 0 -1px 0 rgba(255,255,255,.03);
      border: .5px solid rgba(255,255,255,.15);
    }

    /* ═══ Scrollbar hide ═══ */
    .no-scrollbar { scrollbar-width:none; -ms-overflow-style:none; }
    .no-scrollbar::-webkit-scrollbar { display:none; }

    /* ═══ iOS install banner ═══ */
    .ios-banner {
      position:fixed; z-index:999;
      bottom: calc(90px + var(--safe-bottom));
      left:16px; right:16px;
      border-radius:20px; padding:18px 20px;
      display:flex; align-items:center; gap:14px;
      animation: bannerIn .5s var(--ease-out);
    }
    .ios-banner .x {
      position:absolute; top:10px; right:14px;
      background:none; border:none;
      color:rgba(255,255,255,.3); font-size:22px;
      cursor:pointer; padding:4px; line-height:1;
    }
    @keyframes bannerIn {
      from { transform:translateY(140px) scale(.95); opacity:0; }
      to   { transform:translateY(0) scale(1); opacity:1; }
    }

    /* ═══ Press feedback ═══ */
    .press { transition: transform .15s var(--ease-out), opacity .15s; }
    .press:active { transform: scale(.97); opacity:.85; }

    /* ═══ Confirm Dialog (liquid glass) ═══ */
    .confirm-backdrop {
      position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,.5);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      display:flex; align-items:center; justify-content:center;
      padding:24px;
      animation: fadeIn .2s ease-out;
    }
    .confirm-dialog {
      width:100%; max-width:320px;
      border-radius:20px; overflow:hidden;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,.10) 0%,
        rgba(255,255,255,.05) 50%,
        rgba(255,255,255,.08) 100%
      );
      backdrop-filter: blur(50px) saturate(200%) brightness(1.1);
      -webkit-backdrop-filter: blur(50px) saturate(200%) brightness(1.1);
      box-shadow:
        0 24px 80px rgba(0,0,0,.5),
        inset 0 .5px 0 rgba(255,255,255,.25),
        inset 0 -1px 0 rgba(255,255,255,.03);
      border: .5px solid rgba(255,255,255,.15);
      animation: dialogIn .3s var(--ease-out);
    }
    .confirm-body { padding:28px 24px 20px; text-align:center; }
    .confirm-title { font-size:17px; font-weight:700; color:rgba(255,255,255,.92); line-height:1.4; }
    .confirm-msg { font-size:13px; color:rgba(255,255,255,.38); margin-top:6px; line-height:1.5; }
    .confirm-actions {
      display:flex;
      border-top:.5px solid rgba(255,255,255,.08);
    }
    .confirm-actions button {
      flex:1; padding:16px 8px;
      border:none; background:transparent;
      font-size:16px; font-family:inherit;
      cursor:pointer; transition: background .15s;
    }
    .confirm-actions button:active { background:rgba(255,255,255,.06); }
    .confirm-actions button + button { border-left:.5px solid rgba(255,255,255,.08); }
    .confirm-actions .confirm-cancel { color:rgba(255,255,255,.55); font-weight:500; }
    .confirm-actions .confirm-destructive { color:#FF6B6B; font-weight:700; }

    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes fadeOut { from{opacity:1} to{opacity:0} }
    @keyframes dialogIn { from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes dialogOut { from{transform:scale(1);opacity:1} to{transform:scale(.92);opacity:0} }

    /* ═══ Conflict group ═══ */
    .conflict-group {
      position:relative;
      border-radius:22px; padding:12px 10px 4px;
      margin-bottom:8px;
      background:rgba(255,80,80,.04);
      border:.5px solid rgba(255,80,80,.12);
    }
  </style>

  <!-- iOS install prompt -->
  <script>
    (function(){
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.maxTouchPoints > 1 && /Macintosh/.test(navigator.userAgent));
      const isStandalone = navigator.standalone === true ||
        matchMedia('(display-mode:standalone)').matches;

      if(isIOS && !isStandalone && !sessionStorage.getItem('pwa-x')){
        const banner = document.createElement('div');
        banner.className = 'ios-banner liquid-glass';

        const closeBtn = document.createElement('button');
        closeBtn.className = 'x';
        closeBtn.textContent = '\u00d7';
        closeBtn.addEventListener('click', function() {
          banner.remove();
          sessionStorage.setItem('pwa-x', '1');
        });

        const icon = document.createElement('div');
        icon.style.fontSize = '38px';
        icon.textContent = '\u2B06\uFE0F';

        const textWrap = document.createElement('div');
        const title = document.createElement('div');
        title.style.cssText = 'font-size:15px;font-weight:700';
        title.textContent = '加入主畫面';

        const desc = document.createElement('div');
        desc.style.cssText = 'font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;line-height:1.5';
        desc.textContent = '點擊 分享 → 加入主畫面';

        textWrap.appendChild(title);
        textWrap.appendChild(desc);
        banner.appendChild(closeBtn);
        banner.appendChild(icon);
        banner.appendChild(textWrap);
        document.body.appendChild(banner);
      }
    })();
  </script>

      {id:"2-QC-6",day:2,stage:"QC",artist:"DJ 賴皮 MR.SKIN 國語作業簿",start:"20:10",end:"20:50"},
      {id:"2-XG-1",day:2,stage:"XG",artist:"打倒三明治",start:"13:20",end:"13:50"},
      {id:"2-XG-2",day:2,stage:"XG",artist:"LEIGHT NINE",start:"14:20",end:"14:50"},
    ];

    const t2m=t=>{const[h,m]=t.split(":").map(Number);return h*60+m};
    const clash=(a,b)=>a.day===b.day&&t2m(a.start)<t2m(b.end)&&t2m(b.start)<t2m(a.end);

    const openDB = () => new Promise((resolve, reject) => {
      const req = indexedDB.open("mp2026", 1);
      req.onupgradeneeded = () => req.result.createObjectStore("s");
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    const dbGet = async () => {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const req = db.transaction("s", "readonly").objectStore("s").get("v");
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => resolve([]);
        });
      } catch (err) {
        console.warn("dbGet failed:", err);
        return [];
      }
    };

    const dbSet = async (value) => {
      try {
        const db = await openDB();
        db.transaction("s", "readwrite").objectStore("s").put(value, "v");
      } catch (err) {
        console.warn("dbSet failed:", err);
      }
    };

    /* ══════════════════════════════════════
       Liquid Glass Design System
       ══════════════════════════════════════ */

    // Segmented Control — Apple-style with floating indicator
    function Segment({items, value, onChange, size="md"}) {
      const idx = items.findIndex(i=>i.value===value);
      const count = items.length;
      const pad = size==="sm" ? 2 : 3;
      const py = size==="sm" ? "6px" : "9px";
      const fs = size==="sm" ? 12 : 14;
      return (
        <div style={{
          position:"relative", display:"flex", padding:pad,
          borderRadius: size==="sm" ? 10 : 12,
          background:"rgba(255,255,255,.06)",
          border:".5px solid rgba(255,255,255,.08)",
        }}>
          {/* sliding indicator */}
          <div style={{
            position:"absolute",
            top:pad, bottom:pad,
            left: `calc(${pad}px + ${idx/count*100}%)`,
            width:`calc(${100/count}% - ${pad}px)`,
            borderRadius: size==="sm" ? 8 : 10,
            background:"linear-gradient(180deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,.10) 100%)",
            boxShadow:"0 2px 8px rgba(0,0,0,.2), inset 0 .5px 0 rgba(255,255,255,.3)",
            transition:"left .35s cubic-bezier(.16,1,.3,1)",
          }}/>
          {items.map(item=>(
            <button key={item.value} onClick={()=>onChange(item.value)} style={{
              flex:1, position:"relative", zIndex:1,
              padding:`${py} 0`, border:"none", borderRadius:10,
              background:"transparent", cursor:"pointer",
              fontSize:fs, fontWeight:600, fontFamily:"inherit",
              color: value===item.value ? "rgba(255,255,255,.95)" : "rgba(255,255,255,.35)",
              transition:"color .25s",
              letterSpacing: size==="sm" ? 0 : .2,
            }}>
              {item.label}
            </button>
          ))}
        </div>
      );
    }

    // Pill filter chip
    function Pill({label, active, color, onClick}) {
      return (
        <button className="press" onClick={onClick} style={{
          padding:"7px 16px", borderRadius:100, border:"none",
          fontSize:12, fontWeight:600, cursor:"pointer",
          whiteSpace:"nowrap", flexShrink:0, fontFamily:"inherit",
          background: active
            ? `linear-gradient(135deg, ${color||"rgba(255,255,255,.2)"}30, ${color||"rgba(255,255,255,.15)"}18)`
            : "rgba(255,255,255,.04)",
          color: active ? (color||"#fff") : "rgba(255,255,255,.28)",
          boxShadow: active
            ? `0 0 0 .5px ${color||"rgba(255,255,255,.2)"}50, 0 2px 8px ${color||"rgba(0,0,0,.15)"}30, inset 0 .5px 0 rgba(255,255,255,.15)`
            : "0 0 0 .5px rgba(255,255,255,.06)",
          transition:"all .2s cubic-bezier(.16,1,.3,1)",
        }}>
          {label}
        </button>
      );
    }

    // Stage badge — frosted colored chip
    function Badge({stage, large}) {
      const s=STAGES[stage]; if(!s) return null;
      return (
        <span style={{
          display:"inline-flex", alignItems:"center",
          background:`linear-gradient(135deg, ${s.bg}DD, ${s.bg}99)`,
          color:"#fff", padding:large?"3px 11px":"2px 8px",
          borderRadius:large?8:6, fontSize:large?11:10,
          fontWeight:700, letterSpacing:.4, whiteSpace:"nowrap",
          flexShrink:0,
          boxShadow:`0 1px 4px ${s.bg}50, inset 0 .5px 0 rgba(255,255,255,.25)`,
        }}>
          {s.name}
        </span>
      );
    }

    // Artist card — glass card with tinted selection
    function Card({item, selected, dimmed, conflict, onToggle}) {
      const c = STAGES[item.stage]?.bg||"#888";
      return (
        <button className="press" onClick={()=>onToggle(item.id)} style={{
          display:"flex", alignItems:"center", gap:11,
          width:"100%", padding:"15px 16px",
          borderRadius:18, cursor:"pointer", textAlign:"left",
          position:"relative", color:"inherit", fontFamily:"inherit",
          background: selected
            ? `linear-gradient(135deg, ${c}20, ${c}0A)`
            : "rgba(255,255,255,.03)",
          border: selected
            ? `.5px solid ${c}50`
            : ".5px solid rgba(255,255,255,.06)",
          boxShadow: selected
            ? `0 4px 24px ${c}18, inset 0 .5px 0 rgba(255,255,255,.12), inset 0 0 0 .5px ${c}20`
            : "inset 0 .5px 0 rgba(255,255,255,.06)",
          backdropFilter: selected ? "blur(30px) saturate(200%)" : "none",
          WebkitBackdropFilter: selected ? "blur(30px) saturate(200%)" : "none",
          opacity: dimmed&&!selected ? .35 : 1,
          transition:"all .25s cubic-bezier(.16,1,.3,1)",
        }}>
          {/* check badge */}
          {selected && (
            <span style={{
              position:"absolute", top:-7, right:-7,
              width:24, height:24, borderRadius:"50%",
              background:`linear-gradient(145deg, ${c}, ${c}BB)`,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:12, color:"#fff", fontWeight:700,
              boxShadow:`0 3px 12px ${c}60, inset 0 1px 0 rgba(255,255,255,.3)`,
              transition:"transform .3s cubic-bezier(.175,.885,.32,1.275)",
            }}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2.5 6.5L5 9L9.5 3.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </span>
          )}

          <span style={{
            fontVariantNumeric:"tabular-nums", fontSize:13,
            color:"rgba(255,255,255,.38)", minWidth:85, fontWeight:500,
          }}>
            {item.start}–{item.end}
          </span>

          <Badge stage={item.stage}/>

          <span style={{
            fontSize:15, fontWeight:600, flex:1,
            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
            lineHeight:1.3,
          }}>
            {item.artist}
          </span>

          {conflict&&selected&&(
            <span style={{
              fontSize:10, fontWeight:700, flexShrink:0,
              background:"rgba(255,80,80,.12)", color:"#FF6B6B",
              padding:"3px 9px", borderRadius:8,
              boxShadow:"inset 0 .5px 0 rgba(255,255,255,.08)",
            }}>衝突</span>
          )}
        </button>
      );
    }

    // Schedule timeline card (single, no conflict wrapper)
    function TimelineCard({item, gap}) {
      const c = STAGES[item.stage]?.bg||"#888";
      const dur = t2m(item.end)-t2m(item.start);
      return (
        <>
          {gap!==null&&gap>0&&(
            <div style={{
              display:"flex", alignItems:"center", gap:8,
              padding:"8px 0", justifyContent:"center",
            }}>
              <div style={{flex:1, height:.5, background:"rgba(255,255,255,.06)"}}/>
              <span style={{fontSize:11, color:"rgba(255,255,255,.2)", fontWeight:500}}>
                {gap} 分鐘
              </span>
              <div style={{flex:1, height:.5, background:"rgba(255,255,255,.06)"}}/>
            </div>
          )}
          <div style={{
            position:"relative", marginBottom:8,
            borderRadius:18, overflow:"hidden",
            background:`linear-gradient(135deg, ${c}14, ${c}08)`,
            border:`.5px solid ${c}25`,
            boxShadow:`0 2px 16px ${c}10, inset 0 .5px 0 rgba(255,255,255,.1)`,
          }}>
            {/* Color accent bar */}
            <div style={{
              position:"absolute", left:0, top:0, bottom:0, width:3,
              background:`linear-gradient(180deg, ${c}, ${c}88)`,
              borderRadius:"3px 0 0 3px",
            }}/>
            <div style={{padding:"16px 18px 16px 20px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{
                  fontVariantNumeric:"tabular-nums", fontSize:13,
                  color:"rgba(255,255,255,.45)", fontWeight:600,
                }}>
                  {item.start} – {item.end}
                </span>
                <Badge stage={item.stage} large/>
              </div>
              <div style={{fontSize:17,fontWeight:700,marginTop:8,lineHeight:1.3}}>
                {item.artist}
              </div>
              <div style={{fontSize:12,color:"rgba(255,255,255,.25)",marginTop:4,fontWeight:500}}>
                {dur} 分鐘
              </div>
            </div>
          </div>
        </>
      );
    }

    // Conflict group wrapper — groups overlapping items visually
    function ConflictGroup({items}) {
      return (
        <div className="conflict-group">
          <div style={{
            display:"flex", alignItems:"center", gap:6,
            marginBottom:10, paddingLeft:4,
          }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M8 1.5L14.5 13H1.5L8 1.5Z" stroke="#FF6B6B" strokeWidth="1.5" strokeLinejoin="round"/>
              <path d="M8 6.5V9.5" stroke="#FF6B6B" strokeWidth="1.5" strokeLinecap="round"/>
              <circle cx="8" cy="11.5" r=".75" fill="#FF6B6B"/>
            </svg>
            <span style={{fontSize:12, fontWeight:700, color:"#FF6B6B"}}>
              時間衝突
            </span>
            <span style={{fontSize:11, color:"rgba(255,80,80,.45)", fontWeight:500}}>
              — 以下演出時間重疊，需擇一前往
            </span>
          </div>
          {items.map(item=>(
            <TimelineCard key={item.id} item={item} gap={null}/>
          ))}
        </div>
      );
    }

    // Liquid glass confirm dialog
    function ConfirmDialog({title, message, confirmLabel, onConfirm, onClose}) {
      const [closing, setClosing] = useState(false);
      const dismiss = useCallback(() => {
        setClosing(true);
        setTimeout(onClose, 220);
      }, [onClose]);
      const handleConfirm = useCallback(() => {
        setClosing(true);
        setTimeout(() => { onClose(); onConfirm(); }, 220);
      }, [onClose, onConfirm]);
      return ReactDOM.createPortal(
        <div className="confirm-backdrop"
          style={closing ? {animation:"fadeOut .22s ease-out forwards"} : {}}
          onClick={dismiss}
        >
          <div className="confirm-dialog"
            style={closing ? {animation:"dialogOut .22s var(--ease-out) forwards"} : {}}
            onClick={e=>e.stopPropagation()}
          >
            <div className="confirm-body">
              <div className="confirm-title">{title}</div>
              {message && <div className="confirm-msg">{message}</div>}
            </div>
            <div className="confirm-actions">
              <button className="confirm-cancel" onClick={dismiss}>取消</button>
              <button className="confirm-destructive" onClick={handleConfirm}>{confirmLabel}</button>
            </div>
          </div>
        </div>,
        document.body
      );
    }

    /* ══════════ App ══════════ */

    function App() {
      const [sel,setSel]=useState([]);
      const [view,setView]=useState("pick");
      const [day,setDay]=useState(1);
      const [stg,setStg]=useState("ALL");
      const [q,setQ]=useState("");
      const [rdy,setRdy]=useState(false);
      const [showSheet,setShowSheet]=useState(false);

      useEffect(()=>{dbGet().then(v=>{setSel(v);setRdy(true)})},[]);
      useEffect(()=>{if(rdy)dbSet(sel)},[sel,rdy]);

      const toggle=useCallback(id=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]),[]);

      const selItems=useMemo(()=>T.filter(t=>sel.includes(t.id)),[sel]);
      const confIds=useMemo(()=>{const s=new Set();for(let i=0;i<selItems.length;i++)for(let j=i+1;j<selItems.length;j++)if(clash(selItems[i],selItems[j])){s.add(selItems[i].id);s.add(selItems[j].id)}return s},[selItems]);
      const dimIds=useMemo(()=>{const s=new Set();T.forEach(t=>{if(sel.includes(t.id))return;for(const si of selItems)if(clash(t,si)){s.add(t.id);break}});return s},[sel,selItems]);

      const list=useMemo(()=>T.filter(t=>{if(t.day!==day)return false;if(stg!=="ALL"&&t.stage!==stg)return false;if(q&&!t.artist.toLowerCase().includes(q.toLowerCase()))return false;return true}).sort((a,b)=>t2m(a.start)-t2m(b.start)),[day,stg,q]);

      const sched=useMemo(()=>{const d={1:[],2:[]};selItems.forEach(i=>d[i.day]?.push(i));Object.values(d).forEach(a=>a.sort((x,y)=>t2m(x.start)-t2m(y.start)));return d},[selItems]);
      const stgsDay=useMemo(()=>{const s=new Set();T.forEach(t=>{if(t.day===day)s.add(t.stage)});return["ALL",...Object.keys(STAGES).filter(k=>s.has(k))]},[day]);
      const nC=Math.floor(confIds.size/2);

      return (
        <div style={{
          position:"relative", zIndex:1,
          minHeight:"100dvh", maxWidth:520, margin:"0 auto",
          paddingBottom:`calc(90px + var(--safe-bottom))`,
        }}>

          {/* ══ Floating Header ══ */}
          <div className="liquid-glass" style={{
            position:"sticky", top:0, zIndex:100,
            padding:`calc(14px + var(--safe-top)) 18px 14px`,
            borderRadius:"0 0 24px 24px",
            borderTop:"none",
          }}>
            {/* Title */}
            <div style={{marginBottom:14}}>
              <h1 style={{
                fontSize:24, fontWeight:800, letterSpacing:-.5, lineHeight:1.2,
              }}>
                <span style={{
                  background:"linear-gradient(135deg, #FF6B6B 0%, #F4A261 50%, #FFD93D 100%)",
                  WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
                }}>大港開唱</span>
                <span style={{color:"rgba(255,255,255,.25)", fontWeight:600, fontSize:20, marginLeft:6}}>2026</span>
              </h1>
              <p style={{fontSize:13, color:"rgba(255,255,255,.32)", marginTop:4, fontWeight:500}}>
                3/21–22 高雄駁二
                <span style={{margin:"0 6px", opacity:.3}}>·</span>
                已選 {sel.length} 組
                {nC>0&&(
                  <span style={{
                    marginLeft:8, display:"inline-block",
                    background:"rgba(255,80,80,.15)", color:"#FF6B6B",
                    fontSize:11, fontWeight:700, padding:"2px 9px", borderRadius:8,
                  }}>{nC} 衝突</span>
                )}
              </p>
            </div>

            {/* Mode toggle */}
            <Segment
              items={[{value:"pick",label:"選團"},{value:"sched",label:"行程表"}]}
              value={view} onChange={setView}
            />

            {view==="pick"&&(
              <>
                {/* Day toggle */}
                <div style={{marginTop:10}}>
                  <Segment
                    items={[{value:1,label:"DAY 1 · 3/21 六"},{value:2,label:"DAY 2 · 3/22 日"}]}
                    value={day} onChange={v=>{setDay(v);setStg("ALL")}} size="sm"
                  />
                </div>

                {/* Search */}
                <div style={{position:"relative",marginTop:10}}>
                  <svg style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",opacity:.25}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                    <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
                  </svg>
                  <input
                    value={q} onChange={e=>setQ(e.target.value)}
                    placeholder="搜尋藝人..."
                    style={{
                      width:"100%", padding:"11px 14px 11px 36px",
                      borderRadius:14, boxSizing:"border-box",
                      border:".5px solid rgba(255,255,255,.08)",
                      background:"rgba(255,255,255,.04)",
                      color:"rgba(255,255,255,.9)", fontSize:15,
                      outline:"none", fontFamily:"inherit",
                      transition:"all .2s",
                      boxShadow:"inset 0 .5px 0 rgba(255,255,255,.06)",
                    }}
                    onFocus={e=>{e.target.style.borderColor="rgba(255,255,255,.2)";e.target.style.background="rgba(255,255,255,.07)"}}
                    onBlur={e=>{e.target.style.borderColor="rgba(255,255,255,.08)";e.target.style.background="rgba(255,255,255,.04)"}}
                  />
                </div>

                {/* Stage pills */}
                <div className="no-scrollbar" style={{
                  display:"flex", gap:7, overflowX:"auto",
                  paddingTop:10, paddingBottom:2,
                }}>
                  {stgsDay.map(s=>(
                    <Pill
                      key={s}
                      label={s==="ALL"?"全部":STAGES[s]?.name}
                      active={stg===s}
                      color={s==="ALL"?null:STAGES[s]?.bg}
                      onClick={()=>setStg(s)}
                    />
                  ))}
                </div>
              </>
            )}
          </div>

          {/* ══ Content ══ */}
          <div style={{padding:"12px 16px 0"}}>
            {view==="pick" ? (
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {list.length===0&&(
                  <div style={{
                    textAlign:"center", padding:"100px 20px",
                    color:"rgba(255,255,255,.18)", fontSize:16, fontWeight:500,
                  }}>
                    {q?"找不到符合的藝人":"此舞台本日無演出"}
                  </div>
                )}
                {list.map(item=>(
                  <Card
                    key={item.id} item={item}
                    selected={sel.includes(item.id)}
                    dimmed={dimIds.has(item.id)}
                    conflict={confIds.has(item.id)}
                    onToggle={toggle}
                  />
                ))}
              </div>
            ) : (
              <div>
                {sel.length===0 ? (
                  <div style={{
                    textAlign:"center", padding:"100px 20px",
                    color:"rgba(255,255,255,.18)", fontSize:16,
                    fontWeight:500, lineHeight:2,
                  }}>
                    還沒選任何演出<br/>切換到「選團」開始挑選
                  </div>
                ) : (
                  [1,2].map(d=>{
                    const items=sched[d]; if(!items?.length)return null;
                    // Build segments: group overlapping conflicts together
                    const segments = [];
                    let i = 0;
                    while (i < items.length) {
                      if (confIds.has(items[i].id)) {
                        // Collect all items that overlap with any item in the group
                        const group = [items[i]];
                        let j = i + 1;
                        while (j < items.length) {
                          const overlapsAny = group.some(g => clash(items[j], g));
                          if (overlapsAny) { group.push(items[j]); j++; }
                          else break;
                        }
                        if (group.length > 1) {
                          segments.push({type:"conflict", items:group});
                          i = j;
                        } else {
                          segments.push({type:"single", item:items[i]});
                          i++;
                        }
                      } else {
                        segments.push({type:"single", item:items[i]});
                        i++;
                      }
                    }
                    return(
                      <div key={d} style={{marginBottom:24}}>
                        <div style={{
                          display:"flex", alignItems:"baseline", gap:8,
                          margin:"20px 0 14px",
                        }}>
                          <h3 style={{
                            fontSize:18, fontWeight:800,
                            background: d===1
                              ? "linear-gradient(135deg,#FF6B6B,#E63946)"
                              : "linear-gradient(135deg,#F4A261,#EF6C00)",
                            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
                          }}>
                            {d===1?"DAY 1":"DAY 2"}
                          </h3>
                          <span style={{fontSize:13,color:"rgba(255,255,255,.22)",fontWeight:500}}>
                            {d===1?"3/21 (六)":"3/22 (日)"}
                          </span>
                          <span style={{fontSize:12,color:"rgba(255,255,255,.15)",fontWeight:500}}>
                            {items.length} 組
                          </span>
                        </div>
                        {segments.map((seg,si)=>{
                          const prevEnd = si > 0
                            ? t2m((segments[si-1].type==="conflict"
                                ? segments[si-1].items[segments[si-1].items.length-1]
                                : segments[si-1].item).end)
                            : null;
                          const curStart = t2m(seg.type==="conflict" ? seg.items[0].start : seg.item.start);
                          const gap = prevEnd !== null ? curStart - prevEnd : null;

                          if (seg.type === "conflict") {
                            return (
                              <React.Fragment key={"cg-"+si}>
                                {gap!==null&&gap>0&&(
                                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",justifyContent:"center"}}>
                                    <div style={{flex:1,height:.5,background:"rgba(255,255,255,.06)"}}/>
                                    <span style={{fontSize:11,color:"rgba(255,255,255,.2)",fontWeight:500}}>{gap} 分鐘</span>
                                    <div style={{flex:1,height:.5,background:"rgba(255,255,255,.06)"}}/>
                                  </div>
                                )}
                                <ConflictGroup items={seg.items}/>
                              </React.Fragment>
                            );
                          }
                          return <TimelineCard key={seg.item.id} item={seg.item} gap={gap}/>;
                        })}
                      </div>
                    );
                  })
                )}
                {sel.length>0&&(
                  <div style={{textAlign:"center",padding:"8px 0 20px"}}>
                    <button className="press" onClick={()=>setShowSheet(true)} style={{
                      padding:"13px 32px", borderRadius:100,
                      border:".5px solid rgba(255,80,80,.2)",
                      background:"rgba(255,80,80,.08)",
                      color:"#FF6B6B", fontSize:15, fontWeight:600,
                      cursor:"pointer", fontFamily:"inherit",
                      boxShadow:"0 2px 12px rgba(255,80,80,.08), inset 0 .5px 0 rgba(255,255,255,.06)",
                    }}>
                      清除所有選取
                    </button>
                  </div>
                )}
                {showSheet&&(
                  <ConfirmDialog
                    title="清除所有選取？"
                    message={`已選的 ${sel.length} 組演出將全部移除，此操作無法復原。`}
                    confirmLabel="清除"
                    onConfirm={()=>setSel([])}
                    onClose={()=>setShowSheet(false)}
                  />
                )}
              </div>
            )}
          </div>

          {/* ══ Floating Tab Bar ══ */}
          <div className="liquid-glass" style={{
            position:"fixed", bottom:0, left:0, right:0, zIndex:200,
            borderRadius:"20px 20px 0 0",
            borderBottom:"none",
            padding:`14px 0 calc(14px + var(--safe-bottom))`,
            display:"flex", justifyContent:"center", gap:20,
            fontSize:13, fontWeight:500,
            color:"rgba(255,255,255,.30)",
          }}>
            <span>DAY 1 <span style={{fontWeight:700,color:"rgba(255,255,255,.5)"}}>{sched[1]?.length||0}</span></span>
            <span style={{color:"rgba(255,255,255,.08)"}}>|</span>
            <span>DAY 2 <span style={{fontWeight:700,color:"rgba(255,255,255,.5)"}}>{sched[2]?.length||0}</span></span>
            {nC>0&&(
              <>
                <span style={{color:"rgba(255,255,255,.08)"}}>|</span>
                <span style={{color:"#FF6B6B",fontWeight:700}}>{nC} 衝突</span>
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
